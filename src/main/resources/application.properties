gg.jte.development-mode=true
spring.application.name=CodeExample

# Tell Hibernate to create tables if they don't exist
spring.jpa.hibernate.ddl-auto=create-only

# SQL Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.datasource.url=jdbc:mysql://localhost:3306/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# A long random secret ? used to sign and verify tokens
jwt.secret=xxx
jwt.expiration=86400000
# 86400000 ms = 24 hours


# Mailtrap: fake inbox for development
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=xxx
spring.mail.password=xxx
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Google OAuth2 UPDATE WITH CORRECT PASSWORDS
spring.security.oauth2.client.registration.google.client-id=YOUR_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile


spring.docker.compose.lifecycle-management=start_only
spring.devtools.livereload.enabled=true

# Set to false during development to skip authentication
# MUST be true before any demo or production deployment!
app.security.enabled=false
